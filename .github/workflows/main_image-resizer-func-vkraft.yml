name: Build and deploy Node.js project to Azure Function App - image-resizer-func-vkraft

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '18.x'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: image-resizer
        run: |
          npm install

      # ✅ NEW: Zip the correct structure
      - name: Zip function app
        run: |
          cd image-resizer
          powershell Compress-Archive -Path * -DestinationPath ../release.zip

      # ✅ Upload zip instead of folder
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: windows-latest
    needs: build
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      # ✅ Extract zip properly
      - name: Unzip package
        run: |
          powershell Expand-Archive -Path release.zip -DestinationPath .

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: 'image-resizer-func-vkraft'
          slot-name: 'Production'
          package: '.'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_5DFD9D67A0654CE28698806A7E8536F0 }}