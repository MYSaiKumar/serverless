name: Build and deploy Node.js project to Azure Function App - image-resizer-func-vkraft

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'image-resizer'   # ✅ FIXED
  NODE_VERSION: '18.x'   # ✅ safer version

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4



      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: image-resizer   # ✅ FIXED
        run: |
          npm install

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: image-resizer   # ✅ FIXED

  deploy:
    runs-on: windows-latest
    needs: build
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      # - name: Deploy to Azure Functions
      #   uses: Azure/functions-action@v1
      #   with:
      #     app-name: 'image-resizer-func-vkraft'
      #     slot-name: 'Production'
      #     package: '.'   # already inside artifact root
      #     publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_5DFD9D67A0654CE28698806A7E8536F0 }}
      - name: Extract artifact to root
        run: |
          xcopy image-resizer\* . /E /H /C /I
      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: 'image-resizer-func-vkraft'
          slot-name: 'Production'
          package: './'   # keep this
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_5DFD9D67A0654CE28698806A7E8536F0 }}